<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Big B Study Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#2563eb,#7c3aed,#06b6d4,#9333ea);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:450px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:10px;
color:#2563eb;
}

p{
text-align:center;
margin-bottom:20px;
color:#555;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.signup-btn{
background:#2563eb;
color:white;
}

.google-btn{
background:white;
border:1px solid #ddd;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#2563eb;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<p>Join Big B Study Hub Today</p>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button class="btn signup-btn">
Create Account
</button>

<button class="btn google-btn">
Continue with Google
</button>

<div class="link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
